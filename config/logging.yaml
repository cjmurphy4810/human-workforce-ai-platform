version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"
  json:
    class: pythonjsonlogger.jsonlogger.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(message)s %(pathname)s %(lineno)d"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/app.log
    maxBytes: 10485760  # 10 MB
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file]

loggers:
  uvicorn:
    level: INFO
    propagate: false
    handlers: [console]
  uvicorn.error:
    level: INFO
    propagate: false
    handlers: [console]
  uvicorn.access:
    level: INFO
    propagate: false
    handlers: [console]
  sqlalchemy.engine:
    level: WARNING
    propagate: false
    handlers: [console]
