# Fly.io configuration for the Human Workforce AI Platform API.
# App name must be globally unique — change if hwai-platform-api is taken.
app = "hwai-platform-api"
primary_region = "ord"

[build]

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "research_data"
  destination = "/app/agent1-research/data"
