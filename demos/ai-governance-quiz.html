      color: #202124;
    }
    .tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 500;
      background: #e8f0fe; color: #1a73e8;
      border-radius: 4px; padding: 3px 8px;
    }
    .tag svg { width: 13px; height: 13px; }
    .sources-link {
      font-size: 13px; color: #1a73e8;
      text-decoration: none; cursor: pointer;
    }
    .sources-link:hover { text-decoration: underline; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .icon-btn {

    .icon-btn svg { width: 20px; height: 20px; }

    .main {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Progress ── */
    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .progress-counter { font-size: 14px; color: #5f6368; }
    .progress-edit {
      background: none; border: none; cursor: pointer;
      color: #5f6368; padding: 4px;
      border-radius: 50%; display: flex;
      transition: background 0.15s;
    }
    .progress-edit:hover { background: #f1f3f4; }
    .progress-edit svg { width: 18px; height: 18px; }
    .progress-bar-wrap {
      height: 4px; background: #e8eaed; border-radius: 2px;
      margin-bottom: 28px;
    }
    .progress-bar-fill {
      height: 100%; background: #1a73e8; border-radius: 2px;
      transition: width 0.35s ease;
    }

    /* ── Question ── */
    .question-text {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 24px;
      color: #202124;
    }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: 10px; }

    .option {
      border: 1.5px solid #dadce0;
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
      background: #fff;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .option:hover:not(.revealed) { border-color: #1a73e8; background: #f8f9ff; }

    .option-label {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 14px; line-height: 1.5; color: #202124;
    }
    .option-letter {
      font-weight: 500; min-width: 16px;
      color: #5f6368; padding-top: 1px;
    }

    /* Revealed states */
    .option.correct {
      background: #e6f4ea;
      border-color: #34a853;
    }
    .option.selected-wrong {
      background: #fce8e6;
      border-color: #ea4335;
    }
    .option.revealed { cursor: default; }

    .verdict {
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 500;
      margin: 8px 0 4px 26px;
    }
    .verdict.right { color: #137333; }
    .verdict.wrong  { color: #c5221f; }
    .verdict svg { width: 15px; height: 15px; }

    .explanation {
      font-size: 13px; color: #3c4043; line-height: 1.5;
      margin-left: 26px;
    }

    .btn-next {

      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 28px;
      font-size: 14px; font-weight: 500;

    .btn-next:disabled { background: #c5c6c7; cursor: default; }

    }

      background: #fff; color: #1a73e8;
      border-radius: 24px;
      padding: 10px 24px;

      cursor: pointer;
      transition: background 0.15s;
    }

      color: #80868b;

    @media (max-width: 500px) {
      .topbar-title { font-size: 15px; }
      .main { padding: 24px 16px 60px; }
    }
  </style>
</head>

let current = 0;
let selected = null;
let score = 0;
let answered = new Array(QUESTIONS.length).fill(null);

function render() {
  const main = document.getElementById('quizMain');

  if (current >= QUESTIONS.length) {
    renderScore(main);
    return;
  }

  const q = QUESTIONS[current];
  const isAnswered = answered[current] !== null;
  const pct = Math.round(((current) / QUESTIONS.length) * 100);

  main.innerHTML = `
    <div class="progress-row">
      <span class="progress-counter">${current + 1} / ${QUESTIONS.length}</span>
      <button class="progress-edit" title="Edit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>

    <div class="question-text">${q.q}</div>

    <div class="options" id="options">
      ${q.options.map((opt, i) => renderOption(opt, i, isAnswered)).join('')}
    </div>

    <div class="actions">
      <button class="btn-next" ${isAnswered ? '' : 'disabled'} onclick="nextQuestion()">
        ${current < QUESTIONS.length - 1 ? 'Next' : 'Finish'}
      </button>
    </div>
  `;

  if (!isAnswered) {
    main.querySelectorAll('.option').forEach((el, i) => {
      el.addEventListener('click', () => selectOption(i));
    });
  }
}

function renderOption(opt, i, revealed) {
  const letters = ['A', 'B', 'C', 'D'];
  let cls = 'option';
  if (revealed) {
    cls += ' revealed';
    if (opt.correct) cls += ' correct';
    else if (answered[current] === i) cls += ' selected-wrong';
  }

  let verdictHtml = '';
  if (revealed) {
    if (opt.correct) {
      verdictHtml = `<div class="verdict right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Right answer
      </div>`;
    } else if (answered[current] === i) {
      verdictHtml = `<div class="verdict wrong">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Not quite
      </div>`;
    }
  }

  const expHtml = revealed
    ? `<div class="explanation">${opt.explanation}</div>`
    : '';

  return `
    <div class="${cls}">
      <div class="option-label">
        <span class="option-letter">${letters[i]}.</span>
        <span>${opt.text}</span>
      </div>
      ${verdictHtml}
      ${expHtml}
    </div>
  `;
}

function selectOption(i) {
  if (answered[current] !== null) return;
  answered[current] = i;
  if (QUESTIONS[current].options[i].correct) score++;
  render();
}

function nextQuestion() {
  current++;
  render();
}

function renderScore(main) {
  const grade = score >= 10 ? 'Excellent' : score >= 7 ? 'Good work' : score >= 5 ? 'Keep learning' : 'Keep practicing';
  const sub = score >= 10
    ? 'You demonstrate strong command of AI governance principles.'
    : score >= 7
    ? 'Solid understanding with a few areas to revisit.'
    : 'Review the explanations to deepen your knowledge.';

  main.innerHTML = `
    <div class="score-screen">
      <div class="score-circle">
        <div class="score-num">${score}</div>
        <div class="score-denom">out of ${QUESTIONS.length}</div>
      </div>
      <div class="score-title">${grade}</div>
      <div class="score-subtitle">${sub}</div>
      <div class="score-actions">
        <button class="btn-outline" onclick="reviewQuiz()">Review answers</button>
        <button class="btn-next" onclick="restartQuiz()">Retake quiz</button>
      </div>
    </div>
  `;
}

function reviewQuiz() {
  current = 0;
  // Force all questions into "answered" state for review (show results without re-answering)
  // Keep the existing answered array — just re-render from question 0
  render();
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = new Array(QUESTIONS.length).fill(null);
  render();
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).catch(() => {});
}

// Boot
render();
</script>
</body>
</html>
