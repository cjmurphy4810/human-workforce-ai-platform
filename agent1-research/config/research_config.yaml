  # ── Source Definitions ────────────────────────────────────────────────────
  sources:

    - name: "OpenAI Blog"
      url: "https://openai.com/blog/rss.xml"
      type: rss
      topics: [ai, openai, agentic_ai]
      weight: 0.95
      confidence_base: 0.95
      enabled: true

