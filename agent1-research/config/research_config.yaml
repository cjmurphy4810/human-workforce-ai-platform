research:

  schedule:
    interval_hours: 6
    timezone: "America/New_York"
    run_on_startup: true

  fetching:
    request_timeout_seconds: 30
    max_retries: 3
    retry_delay_seconds: 2.0
    articles_per_source: 20
    lookback_days: 7

  scoring:
    weights:
      relevance:            0.20
      business_impact:      0.18
      consulting_potential: 0.15
      podcast_potential:    0.10
      executive_interest:   0.15
      confidence:           0.05
      novelty:              0.07
      urgency:              0.10
    thresholds:
      minimum_overall:   0.30
      high_priority:     0.60
      podcast_minimum:   0.35
      consulting_minimum: 0.35

  outputs:
    archive_dir: "./data/archives"
    max_articles_per_brief: 25
    max_podcast_ideas: 5
    max_consulting_opportunities: 8
    max_linkedin_topics: 10
    max_newsletter_ideas: 8

  # ── Topic Definitions ─────────────────────────────────────────────────────
  topics:

